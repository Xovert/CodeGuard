<!-- EXAM CODE -->
<div class="page exam">
    <p class="d-flex accordion">New Exam
        <button type="button" class="ms-auto icon-trash"><img src="{{ url_for('static', filename='assets/icon_trash.svg') }}" alt=""></button>
        <button type="button" class="up"><img src="{{ url_for('static', filename='assets/icon_arrowupdown.svg') }}" alt=""></button>
        <button type="button" class="down"><img src="{{ url_for('static', filename='assets/icon_arrowupdown.svg') }}" alt=""></button>
        <img src="{{ url_for('static', filename='assets/icon_dropdown.svg') }}" alt="" class="dropdown-icon">
    </p>
    <div class="panel">
        <div class="d-flex type-timer-wrapper">
            <div class="type">
                <label for="exam-code-type-1" class="d-inline-block">Type</label>
                <input type="text" id="exam-code-type-1" class="content-type d-inline-block" value="Exam Code" readonly>
            </div>
            <div class="timer">
                <label class="d-inline-block" for="exam-code-timer-1">Timer</label>
                <input type="time" step="2" id="exam-code-timer-1" required>
            </div>
        </div>
        <div class="question">
            <label for="exam-code-question-1">Question</label>
            <textarea id="exam-code-question-1" rows="2" placeholder="Enter challenge question here..." required></textarea>
        </div>
        <div class="code">
            <label for="exam-code-area-1">Code</label>
            <div class="code-playground">
                <textarea class="code-area" id="exam-code-area-1" rows="10"
                    placeholder="Enter challenge code here..." required></textarea>
                <span class="language-span">PHP</span>
                <button class="run-code d-flex align-items-center">
                    <span>RUN</span>
                    <img src="{{ url_for('static', filename='assets/icon_run.svg') }}" alt="">
                </button>
            </div>
        </div>
    </div>
</div>
