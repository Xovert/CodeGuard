{% extends 'base.html' %}

{% block title %}Profile{% endblock %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static',filename='css/profile.css') }}">
<script src="{{ url_for('static', filename='js/index.js') }}" defer></script>
{% endblock %}

{% block content %}
<body>
    <div class="profile-container">
        <img src="https://via.placeholder.com/100" alt="Profile Picture" class="profile-picture">
        
        <h2>{{username}}</h2>
        
        <div class="profile-details">
            <p><span>Email:</span> {{email}}</p>
            <p><span>Phone:</span> {{phone}}</p>
            <p><span>Date of Birth:</span> {{dob}}</p>
        </div>

        <div class="buttons">
            <a href="{{ url_for('auth.index') }}" class="edit-btn">Edit Profile</a>
            <a href="{{ url_for('auth.index') }}"class="password-btn">Change Password</a>
        </div>
    </div>

{% endblock %}
