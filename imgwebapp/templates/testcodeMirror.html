{% extends 'base.html' %}

{% block title %}Test Code Mirror{% endblock %}

{% block header %}
  <!-- CodeMirror Core CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/codemirror.min.css">
  <!-- Material Theme CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/theme/material.min.css">
  <!-- CodeMirror Core JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/codemirror.min.js"></script>
  <!-- PHP Mode -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/mode/php/php.min.js"></script>
  <!-- Additional Modes : htmlmixed, xml, js, and css-->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.16.0/mode/clike/clike.min.js"></script>
{% endblock %}

{% block content %}
  <h1>CodeMirror PHP with Material Theme</h1>
  <div class="editor-container">
    <textarea id="code-editor">// Start coding in PHP...</textarea>
  </div>

  <script>
    // Ensure CodeMirror initialization runs after DOM load
      CodeMirror.fromTextArea(document.getElementById("code-editor"), {
          lineNumbers: true,            // Display line numbers
          mode: "javascript", // PHP Mode
          // application/x-httpd-php
          theme: "material",            // Material Theme
        });
  </script>
{% endblock %}
