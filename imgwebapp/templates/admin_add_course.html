{% extends 'base.html' %}

{% block title %}Add New Course{% endblock %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static',filename='css/admin_add_course.css') }}">
<script src="{{ url_for('static', filename='js/admin_dashboard.js') }}" defer></script>
{% endblock %}

{% block content %}

{% include "navbar_footer_admin.html" ignore missing %}
<div class="content">
    <div class="course-details">
        <div class="title d-flex align-items-center">
            <h1>Course Details</h1>
        </div>
        <div class="details-wrapper">
            <div class="detail">
                <label for="course-title">Title</label>
                <input type="text" name="course-title" id="course-title" placeholder="Enter course title">
            </div>
            <div class="detail">
                <label for="course-title">Logo</label>
                <input type="file" name="" id="">
            </div>
        </div>
    </div>
</div>

{% endblock %}
