{% extends 'base.html' %}

{% block title %}Admin Dashboard{% endblock %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static',filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<!-- SIDEBAR -->
<section class="sidebar">
    <!-- Logo  -->
    <div class="logo">
        <a href="{{ url_for('auth.admin') }}">
            <img src="{{ url_for('static', filename='assets/LogoCodeGuard.svg') }}"/>
        </a>
    </div>

    <!-- side panel -->
    <div class="menu">
        <ul class="d-flex flex-column">
            <li>
                <img src="{{ url_for('static', filename='assets/icon_home.svg') }}" alt="">
                <a href="{{ url_for('auth.admin') }}">Dashboard</a>
            </li>
            <li>
                <img src="{{ url_for('static', filename='assets/icon_add_circle.svg') }}" alt="">
                <a href="#">Add New Course</a>
            </li>
            <li>
                <img src="{{ url_for('static', filename='assets/icon_logout.svg') }}" alt="">
                <a href="{{ url_for('auth.logout') }}">Log Out</a>
            </li>
        </ul>
    </div>

    <p>Welcome, {{username}}</p>

</section>

<div class="content" style="height: fit-content;">
    <!-- Main content goes here -->
    <div class="title" style="height: fit-content;">
        <h1>List of Courses</h1>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>&copy; 2024 All Rights Reserved</p>
</footer>

{% endblock %}
