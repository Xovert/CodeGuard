{% extends 'base.html' %}

{% block title %}Add New Course{% endblock %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static',filename='css/admin_course.css') }}">
<script src="{{ url_for('static', filename='js/admin_course_content.js') }}" defer></script>
{% endblock %}

{% block content %}

{% include "navbar_footer_admin.html" ignore missing %}
<div class="content">
    <form action="" class="course-content d-flex flex-column">
        <div class="title">
            <h1>Course Contents</h1>
        </div>
    
        <!-- LEARNING -->
        <div class="page">
            <p class="d-flex accordion">Page 1<img src="{{ url_for('static', filename='assets/icon_dropdown.svg') }}" alt="" class="ms-auto"></p>
            <div class="panel">
                <div class="type">
                    <label for="content-type-1" class="d-inline-block">Type</label>
                    <select name="content-type-1" id="content-type-1">
                        <option value="Learning">Learning</option>
                        <option value="Challenge Code">Challenge Code</option>
                        <option value="Challenge Option">Challenge Option</option>
                    </select>
                </div>
                <div class="position-relative">
                    <label for="learning-pic-1">Picture</label>
                    <label for="learning-pic-1" class="input-file">
                        <img src="{{ url_for('static', filename='assets/icon_upload.svg') }}" alt="">
                        Add File
                    </label>
                    <span class="filename">No file chosen</span>
                    <input type="file" name="learning-pic-1" id="learning-pic-1" class="input-file-invi">
                </div>
                <div>
                    <label for="content-learning-1">Content</label>
                    <textarea name="content-learning-1" id="content-learning-1" rows="4"
                        placeholder="Enter learning content here..."></textarea>
                </div>
            </div>
        </div>
    
        <!-- CHALLENGE CODE -->
        <div class="page">
            <p class="d-flex accordion">Page 2<img src="{{ url_for('static', filename='assets/icon_dropdown.svg') }}" alt="" class="ms-auto"></p>
            <div class="panel">
                <div class="type">
                    <label for="content-type-2" class="d-inline-block">Type</label>
                    <select name="content-type-2" id="content-type-2">
                        <option value="Learning">Learning</option>
                        <option value="Challenge Code">Challenge Code</option>
                        <option value="Challenge Option">Challenge Option</option>
                    </select>
                </div>
                <div class="question">
                    <label for="content-question-2">Question</label>
                    <input type="text" name="content-question-2" id="content-question-2"
                        placeholder="Enter challenge question here...">
                </div>
                <div>
                    <label for="code-area-2">Code</label>
                    <div class="code-playground">
                        <textarea class="code-area" name="code-area-2" id="code-area-2" rows="10"
                            placeholder="Enter challenge code here..."></textarea>
                        <span class="language-span">PHP</span>
                        <button class="run-code d-flex align-items-center">
                            <span>RUN</span>
                            <img src="{{ url_for('static', filename='assets/icon_run.svg') }}" alt="">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- CHALLENGE OPTION -->
        <div class="page">
            <p class="d-flex accordion">Page 3<img src="{{ url_for('static', filename='assets/icon_dropdown.svg') }}" alt="" class="ms-auto"></p>
            <div class="panel">
                <div class="type">
                    <label for="content-type-3" class="d-inline-block">Type</label>
                    <select name="content-type-3" id="content-type-3">
                        <option value="Learning">Learning</option>
                        <option value="Challenge Code">Challenge Code</option>
                        <option value="Challenge Option">Challenge Option</option>
                    </select>
                </div>
                <div class="question">
                    <label for="content-question-3">Question</label>
                    <input type="text" name="content-question-3" id="content-question-3"
                        placeholder="Enter challenge question here...">
                </div>
                <div>
                    <label for="code-area-3">Code</label>
                    <div class="code-playground">
                        <textarea class="code-area" name="code-area-3" id="code-area-3" rows="10"
                            placeholder="Enter challenge code here..."></textarea>
                        <span class="language-span">PHP</span>
                        <button class="run-code d-flex align-items-center">
                            <span>RUN</span>
                            <img src="{{ url_for('static', filename='assets/icon_run.svg') }}" alt="">
                        </button>
                    </div>
                </div>
                <div>
                    <label for="">Options</label>
                    <div class="radio-option">
                        <input type="radio" id="option-3-1" name="option-3" value="Option 1">
                        <label for="option-3-1" contenteditable="true">Option 1</label>
                        <img src="{{ url_for('static', filename='assets/icon_exit.svg') }}" alt="">
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="option-3-2" name="option-3" value="Option 2">
                        <label for="option-3-2" contenteditable="true">Option 2</label>
                        <img src="{{ url_for('static', filename='assets/icon_exit.svg') }}" alt="">
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="option-3-3" name="option-3" value="Option 3">
                        <label for="option-3-3" contenteditable="true">Option 3</label>
                        <img src="{{ url_for('static', filename='assets/icon_exit.svg') }}" alt="">
                    </div>
                    <button id="add-option-btn"><img src="{{ url_for('static', filename='assets/icon_add_circle.svg') }}"
                            alt="">Add Option</button>
                </div>
            </div>
        </div>
    
        <div class="button-wrapper d-flex justify-content-center">
            <button class="btn d-flex add-more-page-btn"><img src="{{ url_for('static', filename='assets/icon_plus.svg') }}"
                    alt="">Add more page</button>
            <button class="btn submit-btn" type="submit">Submit</button>
        </div>
    </form>
</div>

{% endblock %}
