{% extends 'base.html' %}

{% block title %}Admin Dashboard{% endblock %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/index.js') }}" defer></script>
{% endblock %}

{% block content %}
    <div class="sidebar">
        <!-- Logo  -->
        <div style="position: absolute; top: 9px; left: 15px; display:flex;">
            <img src="{{ url_for('static', filename='NewCOdeGuard.png') }}" style="width: 40px; height: 50px;" />
            <div style="width: 461px; height: 49px; font-size: 35px;">
                <span class="code">Code</span>
                <span  class="guard">Guard</span>
            </div>
        </div>

    <!-- side panel -->
        
    <div style="margin-top: 65px;">
        <ul>
            <li><a href="{{ url_for('auth.admin') }}">Dashboard</a></li>
            <li><a href="{{ url_for('auth.courseSetting') }}">Course</a></li>
            <li><a href="{{ url_for('auth.settings') }}">Settings</a></li>
            <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
        </ul>
    </div>

    <p style="position: absolute; bottom: 10px; left:10px">Welcome, {{username}}</p>
    
    </div>

    <div class="content">
        <!-- Main content goes here -->
        <h1>Manage Course</h1>
    </div>

{% endblock %}
