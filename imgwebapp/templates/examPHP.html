                <div class="progress-bar"></div>

<!-- CONTENT -->
<div class="content-wrapper d-flex align-items-center flex-column">
    <h1>PHP EXAM !</h1>
    <p>Good Luck Coder !</p>
    <!-- codeMirror -->

    <div class="exam-editor-container">

        <span id="php">PHP  </span>
        <textarea id="editor"><?php
// Vulnerable PHP database connection and query example
$servername = "localhost";
            $username = "root";
            $password = "";
            $dbname = "example_db";
            
// Create connection
$conn = new mysqli($servername, $username, $password, $dbname);
            
// Check connection
if ($conn->connect_error) {
    die("Connection failed: " . $conn->connect_error);
}
            
// Vulnerable SQL query
$user_input = $_GET['username']; // Directly using user input from GET parameter
$sql = "SELECT * FROM users WHERE username = '$user_input'"; // Unsafe query construction
            
// Execute the query
$result = $conn->query($sql);
            
if ($result->num_rows > 0) {
    // Output data of each row
    while($row = $result->fetch_assoc()) {
        echo "id: " . $row["id"] . " - Name: " . $row["username"] . "<br>";
    }
} else {
    echo "0 results";
}
            
// Close connection
$conn->close();
?>
</textarea>
<input type="reset" class="reset"></input>
    </div>

    <input id="run" type="image" src="{{ url_for('static', filename='assets/run-logo.png')}}" alt="Submit" onclick="RunFunction()">

    <script>

        const editorElement = document.getElementById("editor");
        const initialContent = editorElement.value; // Save the initial content of the editor

        // Initialize CodeMirror
        const editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            scrollbarStyle: null,
            lineNumbers: true,
            mode: "application/x-httpd-php",
            theme: "material",
            viewportMargin: Infinity,
        });

        function RunFunction() {
            const code = editor.getValue(); // Get code from CodeMirror
            fetch('/run-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code }),
            })
            .then(response => response.json())
            .then(data => {
                // Display the output
                alert(data.output); // Or display in a designated output area
            })
            .catch(error => console.error('Error:', error));
        }

        const resetButton = document.querySelector('.reset');
        resetButton.addEventListener('click', () => {
        editor.setValue(initialContent); // Restore the initial content
    });
    </script>
    

<!-- buttons -->
    <div class="buttons">
        <button>Previous</button>
        <button>Next</button>
    </div>
</div>
