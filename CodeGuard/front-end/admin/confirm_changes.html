{% for message in get_flashed_messages() %}
<div class="modal fade" id="Error" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="DeletionLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog">
        <div class="modal-content">
            <div class="modal-body d-flex flex-column justify-content-center align-items-center">
                <p class="mt-3 text-center" id="message">{{ message|safe }}aaaaa</p>
            </div>
            <div class="modal-footer d-flex justify-content-center">
                <button type="button" class="btn btn-secondary" id="yes">asd</button>
                <button type="button" class="btn btn-secondary" id="no" data-bs-dismiss="modal" data-mdb-dismiss="modal">dsa</button>
            </div>
        </div>
    </div>
</div>
{% endfor %}
