<!-- EXAM OPTIONS -->
<div class="page exam">
    <p class="d-flex accordion">New Exam
        <button type="button" class="ms-auto icon-trash"><img src="{{ url_for('static', filename='assets/icon_trash.svg') }}" alt=""></button>
        <button type="button" class="up"><img src="{{ url_for('static', filename='assets/icon_arrowupdown.svg') }}" alt=""></button>
        <button type="button" class="down"><img src="{{ url_for('static', filename='assets/icon_arrowupdown.svg') }}" alt=""></button>
        <img src="{{ url_for('static', filename='assets/icon_dropdown.svg') }}" alt="" class="dropdown-icon">
    </p>
    <div class="panel">
        <div class="d-flex type-timer-wrapper">
            <div class="type">
                <label class="d-inline-block">Type</label>
                <span class="content-type d-inline-block">Exam Options</span>
            </div>
            <div class="timer">
                <label class="d-inline-block" for="exam-option-timer-2">Timer</label>
                <input type="time" step="2" id="exam-option-timer-2" required>
            </div>
        </div>
        <div class="question">
            <label for="exam-option-question-2">Question</label>
            <textarea id="exam-option-question-2" rows="2" placeholder="Enter challenge question here..." required></textarea>
        </div>
        <div class="code">
            <label for="exam-option-area-2">Code</label>
            <div class="code-playground">
                <textarea class="code-area" id="exam-option-area-2" rows="10"
                    placeholder="Enter challenge code here..." required></textarea>
                <span class="language-span">PHP</span>
                <button class="run-code d-flex align-items-center">
                    <span>RUN</span>
                    <img src="{{ url_for('static', filename='assets/icon_run.svg') }}" alt="">
                </button>
            </div>
        </div>
        <div class="option">
            <label>Options</label>
            <div class="radio-option">
                <input type="radio" id="exam-option-2-1" name="exam-option-2" value="Option 1" required>
                <label for="exam-option-2-1" contenteditable="true">Enter Option 1</label>
                <img src="{{ url_for('static', filename='assets/icon_exit.svg') }}" alt="">
            </div>
            <div class="radio-option">
                <input type="radio" id="exam-option-2-2" name="exam-option-2" value="Option 2">
                <label for="exam-option-2-2" contenteditable="true">Enter Option 2</label>
                <img src="{{ url_for('static', filename='assets/icon_exit.svg') }}" alt="">
            </div>
            <div class="radio-option">
                <input type="radio" id="exam-option-2-3" name="exam-option-2" value="Option 3">
                <label for="exam-option-2-3" contenteditable="true">Enter Option 3</label>
                <img src="{{ url_for('static', filename='assets/icon_exit.svg') }}" alt="">
            </div>
            <button type="button" class="add-option-btn"><img src="{{ url_for('static', filename='assets/icon_add_circle.svg') }}"
                    alt="">Add Option</button>
        </div>
    </div>
</div>
